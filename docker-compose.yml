version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: mindmentor-db
    environment:
      POSTGRES_DB: mindmentor
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mindmentor-network

  backend:
    build: ./backend
    container_name: mindmentor-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mindmentor
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: mypassword
    depends_on:
      - postgres
    networks:
      - mindmentor-network

  frontend:
    build: ./frontend
    container_name: mindmentor-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - mindmentor-network

volumes:
  postgres_data:

networks:
  mindmentor-network:
    driver: bridge
